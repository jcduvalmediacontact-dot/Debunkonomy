<svg width="680" height="600" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .t { font: 14px sans-serif; fill: #3d3d3a; }
      .ts { font: 12px sans-serif; fill: #73726c; }
      .th { font: 500 14px sans-serif; fill: #3d3d3a; }
      
      .c-blue rect, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th { fill: #0C447C; }
      .c-blue .ts { fill: #185FA5; }
      
      .c-teal rect, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th { fill: #085041; }
      .c-teal .ts { fill: #0F6E56; }
      
      .c-amber rect, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber .th { fill: #633806; }
      .c-amber .ts { fill: #854F0B; }
      
      .c-coral rect, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
      .c-coral .th { fill: #712B13; }
      .c-coral .ts { fill: #993C1D; }
      
      .c-purple rect, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th { fill: #3C3489; }
      .c-purple .ts { fill: #534AB7; }
      
      .c-pink rect, .c-pink circle { fill: #FBEAF0; stroke: #993556; }
      .c-pink .th { fill: #72243E; }
      .c-pink .ts { fill: #993556; }
      
      @media (prefers-color-scheme: dark) {
        .t { fill: #c2c0b6; }
        .ts { fill: #9c9a92; }
        .th { fill: #c2c0b6; }
        
        .c-blue rect, .c-blue circle { fill: #0C447C; stroke: #85B7EB; }
        .c-blue .th { fill: #B5D4F4; }
        .c-blue .ts { fill: #85B7EB; }
        
        .c-teal rect, .c-teal circle { fill: #085041; stroke: #5DCAA5; }
        .c-teal .th { fill: #9FE1CB; }
        .c-teal .ts { fill: #5DCAA5; }
        
        .c-amber rect, .c-amber circle { fill: #633806; stroke: #EF9F27; }
        .c-amber .th { fill: #FAC775; }
        .c-amber .ts { fill: #EF9F27; }
        
        .c-coral rect, .c-coral circle { fill: #712B13; stroke: #F0997B; }
        .c-coral .th { fill: #F5C4B3; }
        .c-coral .ts { fill: #F0997B; }
        
        .c-purple rect, .c-purple circle { fill: #3C3489; stroke: #AFA9EC; }
        .c-purple .th { fill: #CECBF6; }
        .c-purple .ts { fill: #AFA9EC; }
        
        .c-pink rect, .c-pink circle { fill: #72243E; stroke: #ED93B1; }
        .c-pink .th { fill: #F4C0D1; }
        .c-pink .ts { fill: #ED93B1; }
      }
    </style>
  </defs>

  <!-- Triangle central -->
  <path d="M 340 120 L 150 440 L 530 440 Z" fill="none" stroke="#73726c" stroke-width="2" stroke-dasharray="8 4" opacity="0.3"/>

  <!-- Sommet 1 : Taux de change fixe (haut) -->
  <g class="c-blue">
    <rect x="240" y="60" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="78" text-anchor="middle" dominant-baseline="central">Taux de change fixe</text>
    <text class="ts" x="340" y="96" text-anchor="middle" dominant-baseline="central">Stabilité des prix</text>
  </g>

  <!-- Sommet 2 : Mobilité des capitaux (bas gauche) -->
  <g class="c-teal">
    <rect x="40" y="450" width="220" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="150" y="468" text-anchor="middle" dominant-baseline="central">Mobilité des capitaux</text>
    <text class="ts" x="150" y="486" text-anchor="middle" dominant-baseline="central">Libre circulation financière</text>
  </g>

  <!-- Sommet 3 : Politique monétaire autonome (bas droite) -->
  <g class="c-amber">
    <rect x="420" y="450" width="220" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="530" y="468" text-anchor="middle" dominant-baseline="central">Politique monétaire</text>
    <text class="ts" x="530" y="486" text-anchor="middle" dominant-baseline="central">Autonomie nationale</text>
  </g>

  <!-- Côté A : Change fixe + Mobilité = Pas d'autonomie (gauche) -->
  <g class="c-coral">
    <rect x="40" y="250" width="180" height="76" rx="8" stroke-width="0.5"/>
    <text class="th" x="130" y="272" text-anchor="middle" dominant-baseline="central">Côté A</text>
    <text class="ts" x="130" y="292" text-anchor="middle" dominant-baseline="central">Zone euro</text>
    <text class="ts" x="130" y="310" text-anchor="middle" dominant-baseline="central">Change fixe + Mobilité</text>
  </g>

  <!-- Côté B : Mobilité + Autonomie = Change flottant (bas) -->
  <g class="c-purple">
    <rect x="250" y="480" width="180" height="76" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="502" text-anchor="middle" dominant-baseline="central">Côté B</text>
    <text class="ts" x="340" y="522" text-anchor="middle" dominant-baseline="central">États-Unis, Japon</text>
    <text class="ts" x="340" y="540" text-anchor="middle" dominant-baseline="central">Mobilité + Autonomie</text>
  </g>

  <!-- Côté C : Change fixe + Autonomie = Contrôle capitaux (droite) -->
  <g class="c-pink">
    <rect x="460" y="250" width="180" height="76" rx="8" stroke-width="0.5"/>
    <text class="th" x="550" y="272" text-anchor="middle" dominant-baseline="central">Côté C</text>
    <text class="ts" x="550" y="292" text-anchor="middle" dominant-baseline="central">Chine (avant 2000)</text>
    <text class="ts" x="550" y="310" text-anchor="middle" dominant-baseline="central">Change fixe + Autonomie</text>
  </g>

  <!-- Titre central -->
  <g>
    <rect x="240" y="260" width="200" height="56" rx="8" fill="#ffffff" stroke="#73726c" stroke-width="1"/>
    <text class="th" x="340" y="278" text-anchor="middle" dominant-baseline="central">Trinité impossible</text>
    <text class="ts" x="340" y="296" text-anchor="middle" dominant-baseline="central">On peut choisir 2 sur 3</text>
  </g>

  <!-- Légende en bas -->
  <text class="ts" x="340" y="585" text-anchor="middle" opacity="0.6">Un pays ne peut atteindre simultanément que deux des trois objectifs</text>
</svg>